<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Human Management</title>
  <style>
    :root {
      --bg-1: #f9fafb;
      --bg-2: #eef2ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --accent-2: #0284c7;
      --danger: #dc2626;
      --success: #16a34a;
      --border: #dbe4ee;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Arial", sans-serif;
      background: radial-gradient(circle at 15% 20%, var(--bg-2), var(--bg-1) 65%);
      color: var(--text);
      padding: 24px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.06);
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input,
    select,
    button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
    }

    input:focus,
    select:focus {
      outline: 2px solid rgba(14, 165, 233, 0.3);
      border-color: var(--accent);
    }

    button {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(2, 132, 199, 0.25);
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    .table-wrap {
      overflow: auto;
      max-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: #fff;
    }

    thead th {
      text-align: left;
      background: #f1f5f9;
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid #edf2f7;
      color: #1f2937;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
    }

    .refresh-btn {
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      background: #0f172a;
    }

    @media (max-width: 980px) {
      .container {
        grid-template-columns: 1fr;
      }

      .table-wrap {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="panel">
      <h1>Nhập Thông Tin Human</h1>
      <p class="subtitle">Dữ liệu sẽ được lưu vào bảng Human và hiển thị ngay bên phải.</p>

      <form id="human-form" class="form-grid">
        <div>
          <label for="id">ID</label>
          <input id="id" name="id" type="number" min="1" required />
        </div>

        <div>
          <label for="name">Họ tên</label>
          <input id="name" name="name" type="text" maxlength="50" required />
        </div>

        <div>
          <label for="dob">Ngày sinh</label>
          <input id="dob" name="dob" type="date" />
        </div>

        <div>
          <label for="gender">Giới tính</label>
          <select id="gender" name="gender">
            <option value="">-- Chọn --</option>
            <option value="M">Nam (M)</option>
            <option value="F">Nữ (F)</option>
          </select>
        </div>

        <div>
          <label for="typeid">Loại Human</label>
          <select id="typeid" name="typeid" required>
            <option value="">Đang tải...</option>
          </select>
        </div>

        <button type="submit">Lưu vào Database</button>
      </form>

      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <div>
          <h2 style="margin: 0; font-size: 20px;">Danh Sách Human</h2>
          <p class="subtitle" style="margin: 4px 0 0;">Dữ liệu lấy trực tiếp từ SQL Server</p>
        </div>
        <button id="refresh" class="refresh-btn" type="button">Tải lại</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Họ tên</th>
              <th>Ngày sinh</th>
              <th>Giới tính</th>
              <th>Type ID</th>
              <th>Type Name</th>
            </tr>
          </thead>
          <tbody id="humans-body">
            <tr><td colspan="6">Đang tải dữ liệu...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById("human-form");
    const statusEl = document.getElementById("status");
    const bodyEl = document.getElementById("humans-body");
    const typeEl = document.getElementById("typeid");
    const refreshBtn = document.getElementById("refresh");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function formatDate(value) {
      if (!value) return "";
      return value;
    }

    async function loadTypes() {
      try {
        const res = await fetch("/humans/types");
        if (!res.ok) throw new Error("Không thể tải loại Human");
        const types = await res.json();

        typeEl.innerHTML = "<option value=''>-- Chọn loại --</option>";
        types.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.typeid;
          option.textContent = `${item.typeid} - ${item.name}`;
          typeEl.appendChild(option);
        });
      } catch (error) {
        typeEl.innerHTML = "<option value=''>Lỗi tải dữ liệu</option>";
        setStatus(error.message, "error");
      }
    }

    async function loadHumans() {
      try {
        bodyEl.innerHTML = "<tr><td colspan='6'>Đang tải dữ liệu...</td></tr>";
        const res = await fetch("/humans");
        if (!res.ok) throw new Error("Không thể tải danh sách Human");
        const humans = await res.json();

        if (!humans.length) {
          bodyEl.innerHTML = "<tr><td colspan='6'>Chưa có dữ liệu</td></tr>";
          return;
        }

        bodyEl.innerHTML = "";
        humans.forEach((human) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${human.id}</td>
            <td>${human.name}</td>
            <td>${formatDate(human.dob)}</td>
            <td>${human.gender ?? ""}</td>
            <td>${human.typeid}</td>
            <td>${human.type_name}</td>
          `;
          bodyEl.appendChild(row);
        });
      } catch (error) {
        bodyEl.innerHTML = `<tr><td colspan='6'>${error.message}</td></tr>`;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("Đang lưu dữ liệu...");

      const payload = {
        id: Number(document.getElementById("id").value),
        name: document.getElementById("name").value.trim(),
        dob: document.getElementById("dob").value || null,
        gender: document.getElementById("gender").value || null,
        typeid: Number(document.getElementById("typeid").value),
      };

      try {
        const res = await fetch("/humans", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          const detail = data.detail || "Lưu thất bại";
          throw new Error(detail);
        }

        setStatus(data.message || "Lưu thành công", "success");
        form.reset();
        await loadHumans();
      } catch (error) {
        setStatus(error.message, "error");
      }
    });

    refreshBtn.addEventListener("click", loadHumans);

    loadTypes();
    loadHumans();
  </script>
</body>
</html>
